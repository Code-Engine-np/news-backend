services:
  database:
    image: postgres:17-alpine
    container_name: news-backend-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-news_db}
      POSTGRES_USER: ${DB_USER:-news_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-news_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-news_user} -d ${DB_NAME:-news_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-backend-app
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: ${DB_USER:-news_user}
      DB_PASSWORD: ${DB_PASSWORD:-news_password}
      DB_NAME: ${DB_NAME:-news_db}
      DB_SYNCHRONIZE: "true"
      DB_LOGGING: "false"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@news.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin12345!}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
